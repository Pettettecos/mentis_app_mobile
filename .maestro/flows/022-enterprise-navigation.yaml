appId: host.exp.Exponent
---
- launchApp
- waitForAnimationToEnd
- tapOn: 'mentis-app'
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: 'Acesse sua conta'
- tapOn: 'E-mail'
- inputText: ${TEST_ENTERPRISE_EMAIL}
- tapOn: 'Senha'
- inputText: ${TEST_ENTERPRISE_PASSWORD}
- tapOn: 'ENTRAR'
- assertVisible: 'Criar Nova Empresa'
- tapOn: 'Settings'
- waitForAnimationToEnd
- tapOn: 'Home'
- waitForAnimationToEnd
- assertVisible: 'Criar Nova Empresa'
- scroll
