appId: host.exp.Exponent
---
# Forgot Password Flow
- launchApp
- waitForAnimationToEnd
- tapOn: 'mentis-app'
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: 'Acesse sua conta'
- tapOn: 'Esqueceu a senha?'
- assertVisible: 'Recuperar Senha'
- tapOn: 'E-mail'
- inputText: ${TEST_MANAGER_EMAIL}
- tapOn: 'ENVIAR INSTRUÇÕES'
- assertVisible: 'Instruções enviadas'
- assertVisible: 'Instruções enviadas para'
- tapOn: 'CRIAR NOVA SENHA'
- assertVisible: 'Acesse sua conta'

# Forgot Password Validation Flow
- tapOn: 'Acesse sua conta'
- tapOn: 'Esqueceu a senha?'
- assertVisible: 'Recuperar Senha'
- tapOn: 'ENVIAR INSTRUÇÕES'
- assertVisible: 'E-mail é obrigatório'
- tapOn: 'E-mail'
- inputText: 'invalid-email'
- tapOn: 'ENVIAR INSTRUÇÕES'

# Forgot Password Back Flow
- tapOn: 'Voltar'
- assertVisible: 'Acesse sua conta'
